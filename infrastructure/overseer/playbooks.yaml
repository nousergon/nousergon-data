# Nousergon Overseer playbook registry — SSoT for the fleet's failure-response
# paths (alpha-engine-config-I2823, epic alpha-engine-config-I2821).
#
# Consumed by:
#   - infrastructure/lambdas/overseer-dispatcher (bundled into its zip at
#     deploy time) — routes dispatch requests to the executor Lambda and
#     handles verdict escalation.
#   - tests/test_overseer_playbook_registry.py — schema + cross-reference
#     contract (executor lambda dirs exist, benign_reasons present on routed
#     entries).
#
# Contract: playbooks.schema.json (sibling file). Additive-only evolution —
# new OPTIONAL fields are fine; renames/removals require a schema_version bump
# and a dispatcher release that reads both.
#
# `routed: false` entries are inventory-only: they appear here so the registry
# is the ONE place the watch plane's surface is enumerated (probes/alarms/
# dashboards can iterate it), but the overseer-dispatcher refuses to route to
# them (they have their own trigger topology, e.g. groom's demand-driven
# EventBridge cron — a cron→router hop would add a failure mode with zero
# routing decisions to make).

schema_version: 1

playbooks:
  sf-watch:
    description: >-
      Diagnose+fix+rerun agent for a fleet Step Function terminal failure.
      Triage/suppression policy (watch-log, attempt ceilings, fast path) lives
      UPSTREAM in alpha-engine-saturday-sf-watch-dispatcher; this playbook is
      the launch leg it dispatches when an agent is warranted.
    tier: T2
    routed: true
    enabled: true
    executor_function: alpha-engine-sf-watch-spot-dispatcher
    executor_lambda_dir: sf-watch-spot-dispatcher
    # Executor verdict `reason` values that are by-design declines — the
    # router treats them as success (no P1, no page). Anything else with
    # launched!=true escalates. NOTE: unlike ci-watch, this executor has no
    # `concurrent_skip` — defer-not-drop (config#2226) replaced it with
    # `deferred`/`recovered` (+ `drill_concurrent_skip` for drills); the
    # registry lockstep test pins this list to the executor's literals.
    benign_reasons: [disabled, deferred, recovered, drill_concurrent_skip]
    charter: alpha-engine-config/.github/sf-watch-prompt.md
    concurrency_domain: >-
      EC2 tag lock on (cadence_slug, pipeline_name, run_date); defer-not-drop
      via one-shot EventBridge Scheduler self-reinvoke (config#2226).
    supports_drill: true
    kill_switch_env: SF_WATCH_DISPATCH_ENABLED  # on the EXECUTOR Lambda
    # Wiring-integrity checks the overseer-liveness-probe runs (I2831). These
    # migrated verbatim from sf-watch-liveness-probe's per-probe constants — the
    # registry is now the ONE place this surface is enumerated. The pipeline
    # list is a YAML anchor so it is declared ONCE and stays lockstep with
    # saturday-sf-watch-dispatcher's PIPELINES (pinned by
    # tests/test_overseer_playbook_registry.py). The reclaim-checker (config#2270)
    # + disabled-window sweep (config#2257) ACTION paths are NOT here — they stay
    # in the slimmed sf-watch-liveness-probe (their EC2-event trigger topology +
    # 45 pinned tests; full migration tracked as a follow-up).
    liveness:
      checks:
        - type: eventbridge_rule
          rule_name: alpha-engine-saturday-sf-watch-failed
          expect_enabled: true
          expect_target_function: alpha-engine-saturday-sf-watch-dispatcher
          expect_state_machines: &sf_watch_pipelines
            - ne-weekly-freshness-pipeline
            - ne-preopen-trading-pipeline
            - ne-postclose-trading-pipeline
            - ne-weekly-advisory-pipeline
            - ne-modelzoo-sunday-pipeline
        - type: state_machines_exist
          state_machines: *sf_watch_pipelines
        - type: lambda_active
          function: alpha-engine-saturday-sf-watch-dispatcher
        - type: lambda_active
          function: alpha-engine-sf-watch-spot-dispatcher
          report_kill_switch: SF_WATCH_DISPATCH_ENABLED
          launch_config:
            ami_env: SF_WATCH_AMI_ID
            security_group_env: SF_WATCH_SECURITY_GROUP
            subnets_env: SF_WATCH_SUBNETS

  ci-watch:
    description: >-
      Diagnose+fix agent for a fleet main-branch CI failure. Fired from GHA
      (nousergon-lib notify-ci-failure.yml -> repository_dispatch ->
      sf-watch.yml ci-watch-dispatch job -> this router).
    tier: T2
    routed: true
    enabled: true
    executor_function: alpha-engine-ci-watch-dispatcher
    executor_lambda_dir: ci-watch-dispatcher
    benign_reasons: [concurrent_skip, disabled]
    charter: alpha-engine-config/.github/ci-watch-prompt.md
    concurrency_domain: EC2 tag lock on (repo, sha) — per-commit, not per-repo.
    supports_drill: true
    kill_switch_env: CI_WATCH_DISPATCH_ENABLED  # on the EXECUTOR Lambda
    # The ci-watch executor's own liveness (was checked as part of
    # sf-watch-liveness-probe's spot-dispatch leg; now attributed to its own
    # playbook). Kill-switch value REPORTED, never alerted.
    liveness:
      checks:
        - type: lambda_active
          function: alpha-engine-ci-watch-dispatcher
          report_kill_switch: CI_WATCH_DISPATCH_ENABLED

  alert-drain:
    description: >-
      Twice-daily Overseer alert-drain (epic I2821 phase 3, config-I2824):
      consumes the nousergon-overseer-intake queue + S3 fallback, classifies
      incidents into the T0-T3 authority tiers per the alert-drain charter,
      acts within charter authority (v1: PRs, issues, SF reruns only), writes
      the drain ledger. Fired by EventBridge Scheduler (10:00 + 22:00 UTC)
      THROUGH this router.
    tier: T2
    routed: true
    enabled: true
    executor_function: alpha-engine-alert-drain-dispatcher
    executor_lambda_dir: alert-drain-dispatcher
    benign_reasons: [concurrent_skip, disabled]
    charter: alpha-engine-config/.github/alert-drain-prompt.md
    concurrency_domain: >-
      Single lane — EC2 tag lock on Name=alpha-engine-alert-drain-spot (one
      drain at a time; overlap would double-process queue messages).
    supports_drill: true
    kill_switch_env: ALERT_DRAIN_DISPATCH_ENABLED
    # The alert-drain executor's own liveness. Its intake queue + the two
    # intake EventBridge rules are cross-cutting infra, checked under the
    # top-level watch_plane_liveness block below.
    liveness:
      checks:
        - type: lambda_active
          function: alpha-engine-alert-drain-dispatcher
          report_kill_switch: ALERT_DRAIN_DISPATCH_ENABLED

  groom:
    description: >-
      Demand-driven backlog groom (three daily EventBridge cron triggers,
      symmetric demand evaluation, pace gate). Inventory-only here: its
      trigger topology is scheduler-driven with zero routing decisions, so it
      keeps its direct EventBridge->Lambda path.
    tier: T2
    routed: false
    enabled: true
    executor_function: alpha-engine-scheduled-groom-dispatcher
    executor_lambda_dir: scheduled-groom-dispatcher
    charter: alpha-engine-config/scripts/groom_run.sh
    concurrency_domain: EC2 tag lock on groom-issue-filter (tier lane; sweep has its own lane).
    supports_drill: false
    kill_switch_env: GROOM_DISPATCH_ENABLED
    # Run-window accounting migrated from groom-liveness-probe (config#2414/#2667):
    # for each MATURE expected trigger (fixed-cron schedule below UNION the
    # dispatcher's own groom/decisions/ log, covering sweep-mode which has no
    # cron), assert an S3 run artifact's run_start landed in [T, T+ceiling+margin].
    # A trigger with no covering artifact = a silent groom death → problem line.
    # `schedule` MIRRORS scheduled-groom-dispatcher/deploy.sh SCHED_CRONS — the
    # registry is now the SSoT (was GROOM_SCHEDULE env / _DEFAULT_SCHEDULE const).
    liveness:
      checks:
        - type: run_window
          label: groom
          artifact_prefix: groom/
          decision_record_prefix: groom/decisions/
          ceiling_min: 360   # groom_spot_bootstrap.sh MAX_RUNTIME_SECONDS (360 min)
          margin_min: 45     # box boot + report latency slack
          lookback_hours: 30
          schedule:
            - {hour: 1, minute: 0, dows: [0, 1, 2, 3, 4, 5, 6], label: "01:00 daily (Sonnet high-only)"}
            - {hour: 7, minute: 0, dows: [0, 1, 2, 3, 4, 5, 6], label: "07:00 daily (Sonnet mid-only)"}
            - {hour: 19, minute: 0, dows: [0, 1, 2, 3, 4, 5, 6], label: "19:00 daily (Haiku low-only)"}

# ── Cross-cutting watch-plane liveness (alpha-engine-config-I2831) ────────────
# Checks that belong to NO single playbook: the overseer-dispatcher router
# itself + the phase-1 intake plane (setup_overseer_intake.sh, config-I2822).
# Today only CW alarms cover these — the probe now asserts their wiring too.
watch_plane_liveness:
  checks:
    - type: lambda_active
      function: alpha-engine-overseer-dispatcher
    - type: sqs_queue_exists
      queue_name: nousergon-overseer-intake
      expect_dlq: nousergon-overseer-intake-dlq
    - type: eventbridge_rule
      rule_name: overseer-intake-alert-events
      event_bus_name: nousergon-alerts
      expect_enabled: true
      expect_target_queue: nousergon-overseer-intake
    - type: eventbridge_rule
      rule_name: overseer-intake-cw-alarm-state
      expect_enabled: true
      expect_target_queue: nousergon-overseer-intake
