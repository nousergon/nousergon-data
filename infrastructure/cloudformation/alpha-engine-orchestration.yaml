AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Alpha Engine orchestration infrastructure — Step Functions, EventBridge rules,
  SNS topics, and CloudWatch alarms. Does NOT manage Lambda functions, EC2
  instances, or IAM roles (those are managed separately via deploy scripts
  and console). This template captures the "glue" that connects modules.

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  MicroInstanceId:
    Type: String
    Default: i-09b539c844515d549
    Description: Always-on EC2 micro instance ID (runs data collection, dashboard)

  TradingInstanceId:
    Type: String
    Default: i-018eb3307a21329bf
    Description: Trading EC2 instance ID (runs executor, started/stopped daily)

  ResearchLambdaArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:711398986525:function:alpha-engine-research-runner:live

  DataCollectorLambdaArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:711398986525:function:alpha-engine-data-collector:live

  PredictorLambdaArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:711398986525:function:alpha-engine-predictor-inference:live

  AlertsLambdaArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:711398986525:function:alpha-engine-research-alerts

  StepFunctionsRoleArn:
    Type: String
    Default: arn:aws:iam::711398986525:role/alpha-engine-step-functions-role

  EventBridgeSfnRoleArn:
    Type: String
    Default: arn:aws:iam::711398986525:role/alpha-engine-eventbridge-sfn-role

  EventBridgeEc2RoleArn:
    Type: String
    Default: arn:aws:iam::711398986525:role/alpha-engine-eventbridge-role

  AlertEmail:
    Type: String
    Default: cipher813@gmail.com
    Description: Email for SNS alert notifications

# ============================================================================
# Resources
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # SNS Topics
  # --------------------------------------------------------------------------
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: alpha-engine-alerts
      DisplayName: Alpha Engine Alerts

  AlertsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # --------------------------------------------------------------------------
  # DynamoDB — Step Function Execution Mutex (L274 SF MutualExclusionGuard)
  # --------------------------------------------------------------------------
  # Single-writer-per-cadence-cell invariant for the three Alpha Engine SFs.
  # Closes the architectural hole that the L286a/b producer-side
  # `universe_writer_lock` covers for manual `daily_append` invocations —
  # that lock guards the data writer; this table guards the SF entry point.
  # Together they cover both halves of "exactly one cron-fired execution of
  # each SF per slot" (run-date slot for the weekly SF, minute bucket for
  # the weekday/EOD SFs — see Schema note below).
  #
  # Trigger of record: the 2026-05-26 duplicate-EventBridge-target incident
  # (PR #322), where two parallel SF executions raced 321 unique-symbol
  # ArcticDB E_NON_INCREASING_INDEX_VERSION errors in MorningEnrich and
  # hard-failed the weekday pipeline. The PR #322 CFN-target-uniqueness
  # CI gate catches the SPECIFIC duplicate-target shape; this mutex catches
  # the broader class (operator double-paste, EventBridge internal retry-on-
  # throttle, cross-region replay coincidence, any future shape the CI
  # chokepoint misses).
  #
  # Schema: mutex_key (S) PK, plus (config#2280) an OPTIONAL ttl_epoch (N)
  # attribute with table TTL enabled.
  # - WEEKLY SF (step_function.json): mutex_key encodes
  #   `{state-machine-name}#{pipeline_role}#{run_date}` — the RUN-SLOT — so
  #   staggered duplicate triggers of the same run-slot conflict at ANY
  #   minute distance (the old minute bucket only caught same-minute dups).
  #   A run-date key has no natural expiry, so the weekly AcquireMutex
  #   stamps ttl_epoch (~24h) as the crashed-holder BACKSTOP; the PRIMARY
  #   stale-item mechanism is scripts/weekly_sf_rerun.py's verified steal
  #   (delete only after the holder execution is confirmed terminal).
  # - WEEKDAY/EOD SFs still key on the minute bucket and write NO ttl_epoch;
  #   items without the attribute never expire (DynamoDB TTL ignores them),
  #   so this TimeToLiveSpecification is a purely ADDITIVE, backward-
  #   compatible change — enabling TTL on a live table is a safe in-place
  #   UpdateTimeToLive, no table replacement.
  # Item accumulation is ~12 items/week × cadence runs ≈ <1000/yr;
  # PAY_PER_REQUEST storage cost is negligible (sub-cent annual). TTL
  # supersedes the config#730 stale-item sweeper for weekly items; the
  # weekday/eod minute-bucket items remain permanent-but-benign as before.
  ExecutionMutexTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: alpha-engine-sf-execution-mutex
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: mutex_key
          AttributeType: S
      KeySchema:
        - AttributeName: mutex_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl_epoch
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  # NOTE: AlertsTopic also has a SECOND subscriber — a Lambda that mirrors
  # every alert to s3://alpha-engine-research/changelog/incidents/ for the
  # system-wide event-mining changelog. That Lambda + its IAM role + its
  # SNS subscription are managed OUTSIDE this CF stack, in
  # `infrastructure/lambdas/changelog-incident-mirror/`. Reason: when those
  # resources lived in this stack, every CI deploy hit a perm-cascade on
  # the github-actions-lambda-deploy OIDC role (iam:TagRole, iam:GetRole,
  # ...). Orphaning the Lambda kept the OIDC role narrow and removed the
  # cascade. See alpha-engine-config#860 "SNS-mirror Lambda — orphan vs CF
  # management" (migrated from ROADMAP.md on 2026-06-11, config PR #623) for
  # the full trade-off + future reconsideration triggers.

  # --------------------------------------------------------------------------
  # Step Functions — Saturday Pipeline
  # --------------------------------------------------------------------------
  SaturdayPipeline:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: ne-weekly-freshness-pipeline
      RoleArn: !Ref StepFunctionsRoleArn
      DefinitionS3Location:
        Bucket: alpha-engine-research
        Key: infrastructure/step_function.json
      # SINGLE-WRITER CONTRACT (config#2273): the repo file
      # infrastructure/step_function.json is the sole source of truth for
      # this definition. DefinitionS3Location is only READ at stack-create /
      # resource-replacement time; both deploy paths
      # (deploy-infrastructure.sh on merge, deploy_step_function.sh for
      # manual/bootstrap) upload the stamped repo bytes to this exact S3
      # key BEFORE update-state-machine, so a CFN restamp can only ever
      # re-deploy the same bytes — CFN is not an independent writer in
      # practice. Drift backstop across all three copies (repo / S3 / live):
      # infrastructure/step-functions/check-definition-drift.py.
      # LoggingConfiguration is DECLARED here (declarative SoT for the
      # shape) and ASSERTED explicitly (--logging-configuration) by the
      # deploy scripts on every update since config#2273 — never left to
      # partial-update preservation (the recreate-drops-logging class is
      # config#1464). Logging the SF execution FailedEvents (level=ERROR)
      # is what carries the L274 MutexConflict Cause into the log group
      # for the metric filter below. The ne-* rename (config#1381)
      # re-created these SFs without logging — this restores it.
      LoggingConfiguration:
        Level: ERROR
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt WeeklyFreshnessLogGroup.Arn

  # --------------------------------------------------------------------------
  # Step Functions — Weekday Pipeline
  # --------------------------------------------------------------------------
  WeekdayPipeline:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: ne-preopen-trading-pipeline
      RoleArn: !Ref StepFunctionsRoleArn
      DefinitionS3Location:
        Bucket: alpha-engine-research
        Key: infrastructure/step_function_daily.json
      # LoggingConfiguration owned here — see SaturdayPipeline note above.
      LoggingConfiguration:
        Level: ERROR
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt PreopenTradingLogGroup.Arn

  # --------------------------------------------------------------------------
  # Step Functions — Weekly Advisory Pipeline (alpha-engine-config-I2544)
  # --------------------------------------------------------------------------
  # Async child of SaturdayPipeline — the eval-judge chain / EvalRollingMean /
  # RationaleClustering / ReplayConcordance / Counterfactual / AggregateCosts /
  # ReportCard / Director, decoupled from the Saturday critical path.
  # SaturdayPipeline's StartAdvisoryPipeline state fires this fire-and-forget
  # (states:startExecution, NOT .sync) once DataPhase2 completes. NOT an
  # EventBridge target — it has no cron trigger of its own. Same
  # single-writer contract (config#2273) as SaturdayPipeline/WeekdayPipeline —
  # see infrastructure/step_function_advisory.json's top-level Comment.
  AdvisoryPipeline:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: ne-weekly-advisory-pipeline
      RoleArn: !Ref StepFunctionsRoleArn
      DefinitionS3Location:
        Bucket: alpha-engine-research
        Key: infrastructure/step_function_advisory.json
      LoggingConfiguration:
        Level: ERROR
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt WeeklyAdvisoryLogGroup.Arn

  # --------------------------------------------------------------------------
  # Step Functions — ModelZoo Sunday Pipeline (alpha-engine-config-I2545)
  # --------------------------------------------------------------------------
  # The model-zoo rotation (ResolveZooSpecs → ModelZooTrainMap →
  # ModelZooSelect), moved off Saturday to its own Sunday 09:00 UTC trigger
  # (Brian-ruled 2026-07-14 — see ModelZooSundayTrigger below). Ends with a
  # re-invoke of the crucible-evaluator grading Lambda as the persistent-dash
  # re-grade. Triggered directly by EventBridge — unlike AdvisoryPipeline
  # above, this one IS an EventBridge target (it has no upstream SF to fire
  # it fire-and-forget from).
  ModelZooSundayPipeline:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: ne-modelzoo-sunday-pipeline
      RoleArn: !Ref StepFunctionsRoleArn
      DefinitionS3Location:
        Bucket: alpha-engine-research
        Key: infrastructure/step_function_modelzoo.json
      LoggingConfiguration:
        Level: ERROR
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt ModelZooSundayLogGroup.Arn

  # --------------------------------------------------------------------------
  # EventBridge Rules — Pipeline Triggers
  # --------------------------------------------------------------------------
  SaturdayTrigger:
    Type: AWS::Events::Rule
    Properties:
      Name: alpha-engine-saturday
      # 09:00 UTC chosen so polygon's prior-session daily aggregate has
      # settled (T+1 lag) before MorningEnrich + DataPhase1 fetch it.
      # THU-SAT (config#1824, Brian-ratified 2026-07-06): the weekly runs
      # ONE DAY AFTER the week's LAST trading session — Saturday normally,
      # Friday when Friday is an NYSE holiday, Thursday on a Thu+Fri double
      # holiday. The cron fires all three days; the SF's WeeklyRunDayGate
      # (predictor Lambda action=check_weekly_run_day, pure calendar math)
      # self-selects the single correct firing and Succeed-skips the rest.
      # Replaces the hand-built one-shot shift used for the 2026-07-03
      # holiday week.
      Description: Thu-Sat 09:00 UTC — weekly pipeline fires day after last trading session (WeeklyRunDayGate self-selects; config#1824)
      ScheduleExpression: 'cron(0 9 ? * THU-SAT *)'
      State: ENABLED
      Targets:
        # SINGLE TARGET PER RULE. EventBridge dispatches the cron event
        # to every target on a rule; a duplicate target ID fans the
        # trigger to two parallel SF executions. The Tuesday 5/26
        # weekday-pipeline failure (321 E_NON_INCREASING_INDEX_VERSION
        # ArcticDB races during MorningEnrich) was caused by exactly
        # that — PR #317 added a parallel target via the deploy script
        # alongside this CFN target. The substrate gate is the
        # TestCFNTargetUniqueness chokepoint, which fails CI if any
        # cron rule grows a second target. SoT for this rule is THIS
        # FILE; the deploy scripts no longer touch EventBridge.
        - Id: saturday-pipeline
          Arn: !Ref SaturdayPipeline
          RoleArn: !Ref EventBridgeSfnRoleArn
          # pipeline_role tag (Option-D 2026-05-25): identifies this as the
          # canonical Saturday weekly cadence run. Page 25 filters to
          # role="weekly" by default so smoke / recovery / operator-replay
          # executions don't displace the real weekly run as "most recent".
          # Ad-hoc operator launches MUST set their own pipeline_role
          # (smoke / recovery / backfill / operator-replay) per the
          # taxonomy in pipeline-reporting-revamp-260524.md §6.
          Input: !Sub |
            {
              "ec2_instance_id": ["${MicroInstanceId}"],
              "sns_topic_arn": "${AlertsTopic}",
              "pipeline_role": "weekly"
            }

  # Friday-PM "shell run" cron rule (alpha-engine-friday-shell-run) RETIRED
  # 2026-05-29 (ROADMAP L4055): superseded by the event-driven
  # alpha-engine-eod-success-friday-shell-trigger Lambda
  # (infrastructure/lambdas/eod-success-friday-shell-trigger/, shipped #282),
  # which fires the Saturday SF in shell_run mode on the Friday EOD-SF
  # SUCCEEDED transition (trading_day-bound, not wall-clock) — eliminating the
  # cron's three failure modes (no-fire on Friday EOD failure, late-rerun
  # blindness, StopTradingInstance race). The cron ran DISABLED from the 5/21
  # event-driven cutover; the event-driven path confirmed across two Fridays
  # (5/22 + 5/29) before this deletion. The shell_run SF gate
  # (InitializeInput→CheckShellRun/ApplyShellRunDefaults) is UNCHANGED — the
  # Lambda still supplies {"shell_run": true, "pipeline_role": "shell-run"}.

  # RENAMED 2026-07-16 (config#2413 live-verification finding): CloudFormation
  # refuses to change a resource's Type under the same logical ID in an
  # update ("Update of resource type is not permitted") — confirmed via a
  # real --no-execute-changeset dry run. WeekdayTrigger existed as
  # AWS::Events::Rule; renaming the logical ID to WeekdayPipelineSchedule
  # makes CFN treat this as a replacement (delete the old Rule, create the
  # new Schedule) instead of an illegal in-place type transform. The
  # `Name: alpha-engine-weekday` PHYSICAL resource name is unchanged, so
  # nothing outside this template (EventBridge target ARNs, IAM references)
  # needs updating — only this logical ID.
  WeekdayPipelineSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: alpha-engine-weekday
      # 2026-05-19: moved 06:00 → 05:45 PT (13:00 → 12:45 UTC) — bought a
      # 13-min P99 buffer (daemon-ready ≤06:17 PT vs 06:30 open). That buffer
      # has since been consumed by added stages (CodeFreshnessGate, predictor
      # health/drift checks, chronic-gap self-heal): live SF history for
      # 2026-07-09/07-10/07-13 (all SUCCEEDED on the first scheduled attempt)
      # shows RunDaemon completing 06:31:45–06:34:15 PT — 2–4 min AFTER the
      # 06:30 PT open every time, not a one-off. State-level breakdown shows
      # PollMorningArcticAppendSpot alone consuming ~36–38 min (~75% of the
      # ~46–49 min total run) — a known/expected duration already documented
      # in alpha-engine-data's data-spot-dispatcher MAX_RUNTIME_SECONDS
      # comment, not a defect to fix here. 2026-07-13: moved 05:45 → 05:15 PT
      # (30-min buffer above the observed ceiling vs the 13-min buffer the
      # 05:45 change relied on) to absorb the same kind of stage-creep
      # without needing another manual bump every ~2 months. See
      # nousergon/alpha-engine-config#2412 (tracked follow-up: early-warning
      # canary so buffer erosion pages automatically instead of being
      # noticed anecdotally).
      # RESOLVED 2026-07-14 (config#2413): migrated this trigger from
      # AWS::Events::Rule to AWS::Scheduler::Schedule so
      # ScheduleExpressionTimezone can carry real IANA-timezone/DST-aware PT
      # scheduling, matching StopTradingSchedule below. Previously, the bare
      # UTC cron on AWS::Events::Rule (no ScheduleExpressionTimezone support)
      # silently assumed PDT (UTC−7); during PST the effective PT start would
      # have shifted an hour earlier (i.e. MORE buffer, not less — benign,
      # but not the documented 5:15 AM PT contract). EventBridge Scheduler
      # now resolves the cron against America/Los_Angeles directly, so the
      # 12:15 UTC-equivalent cron expression below auto-adjusts across the
      # DST boundary and always fires at 5:15 AM PT.
      Description: Weekday 5:15 AM PT (DST-aware) — daily data + predictor + executor; daemon ready before 06:30 PT open
      ScheduleExpression: 'cron(15 12 ? * MON-FRI *)'
      ScheduleExpressionTimezone: 'America/Los_Angeles'
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        # SINGLE TARGET PER SCHEDULE. See the SaturdayTrigger Targets
        # comment for the 2026-05-26 duplicate-target incident that
        # codified the analogous EventBridge-Rule invariant. SoT for
        # this schedule is THIS FILE; the deploy scripts no longer
        # touch EventBridge/Scheduler.
        #
        # EventBridge Scheduler's Step-Functions integration
        # (arn:aws:scheduler:::aws-sdk:sfn:startExecution) wraps the
        # SFN StartExecution call: StateMachineArn is the target state
        # machine, and Input is a JSON STRING (not a nested object)
        # holding the payload passed through to the execution's own
        # input — the same payload the old AWS::Events::Rule target's
        # top-level Input carried verbatim.
        Arn: 'arn:aws:scheduler:::aws-sdk:sfn:startExecution'
        RoleArn: !Ref EventBridgeSfnRoleArn
        # pipeline_role="daily" (Option-D 2026-05-25): identifies this as
        # the canonical weekday trading-cadence run. Page 25 filters to
        # role="daily" by default for the Weekday section.
        Input: !Sub |
          {
            "StateMachineArn": "${WeekdayPipeline}",
            "Input": "{\"ec2_instance_id\": [\"${MicroInstanceId}\"], \"trading_instance_id\": [\"${TradingInstanceId}\"], \"sns_topic_arn\": \"${AlertsTopic}\", \"pipeline_role\": \"daily\"}"
          }

  # alpha-engine-config-I2545: ModelZoo Sunday trigger. Brian-ruled
  # 2026-07-14 — 09:00 UTC gives a full day of retry headroom before Monday
  # 12:45 UTC preopen (ne-preopen-trading-pipeline). Independent of
  # SaturdayTrigger (no dependency edge in EventBridge; ordering is purely
  # "the day after Saturday" by construction of the two separate cron
  # expressions — no explicit day-of-week arithmetic needed since Sunday
  # always immediately follows Saturday).
  ModelZooSundayTrigger:
    Type: AWS::Events::Rule
    Properties:
      Name: alpha-engine-modelzoo-sunday
      Description: Sunday 09:00 UTC — model-zoo rotation + persistent-dash re-grade (moved off Saturday, alpha-engine-config-I2545)
      ScheduleExpression: 'cron(0 9 ? * SUN *)'
      State: ENABLED
      Targets:
        # SINGLE TARGET PER RULE — see SaturdayTrigger's Targets comment for
        # the 2026-05-26 duplicate-target incident that codified this
        # invariant fleet-wide.
        - Id: modelzoo-sunday-pipeline
          Arn: !Ref ModelZooSundayPipeline
          RoleArn: !Ref EventBridgeSfnRoleArn
          Input: !Sub |
            {
              "ec2_instance_id": ["${MicroInstanceId}"],
              "sns_topic_arn": "${AlertsTopic}",
              "pipeline_role": "modelzoo-sunday"
            }

  # --------------------------------------------------------------------------
  # EventBridge Rules — Independent Triggers
  # --------------------------------------------------------------------------
  ResearchAlerts:
    Type: AWS::Events::Rule
    Properties:
      Name: alpha-research-alerts
      Description: Intraday price alerts every 30 min during market hours
      ScheduleExpression: 'cron(0/30 13-21 ? * MON-FRI *)'
      State: ENABLED
      Targets:
        - Id: alerts-lambda
          Arn: !Ref AlertsLambdaArn

  ResearchAlertsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AlertsLambdaArn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ResearchAlerts.Arn

  # --------------------------------------------------------------------------
  # EventBridge Scheduler — Stop Trading Instance (10 PM PT backstop)
  # --------------------------------------------------------------------------
  # Note: EventBridge Scheduler uses a different API than EventBridge Rules.
  # CloudFormation support for Scheduler is via AWS::Scheduler::Schedule.
  #
  # Role: late-night cost-guard backstop. The EOD SF's
  # ``StopTradingInstance`` + ``ForceStopInstance`` states are the
  # authoritative stoppers right after market close (success or failure
  # path). This scheduler only fires if both of those paths missed —
  # e.g. EOD SF never started, daemon never triggered the SF, or AWS
  # SDK call failures left the instance running past expected stop.
  # 10:00 PM PT places it ~8 h after market close, well outside any
  # legitimate same-day workflow.
  StopTradingSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: alpha-engine-stop-trading
      Description: Cost-guard backstop — stop trading EC2 at 10 PM PT if EOD SF didn't
      ScheduleExpression: 'cron(0 22 ? * MON-FRI *)'
      ScheduleExpressionTimezone: 'America/Los_Angeles'
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: 'arn:aws:scheduler:::aws-sdk:ec2:stopInstances'
        RoleArn: !Ref EventBridgeEc2RoleArn
        Input: !Sub '{"InstanceIds": ["${TradingInstanceId}"]}'

  # --------------------------------------------------------------------------
  # CloudWatch Alarms
  # --------------------------------------------------------------------------
  HealthCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AlphaEngine-HealthCheckFailures
      AlarmDescription: Alert when any data health check fails
      Namespace: AlphaEngine
      MetricName: HealthChecksFailed
      Statistic: Maximum
      Period: 21600  # 6 hours
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ResearchRunnerErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-research-runner-errors
      AlarmDescription: Research Lambda errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-research-runner
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ResearchRunnerNoInvocations:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-research-runner-no-invocations
      AlarmDescription: Research Lambda not invoked (expected weekly)
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-research-runner
      Statistic: Sum
      Period: 604800  # 7 days
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertsTopic

  PredictorInferenceErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-predictor-inference-errors
      AlarmDescription: Predictor Lambda errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-predictor-inference
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  PredictorNoInvocations:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-predictor-inference-no-invocations
      AlarmDescription: Predictor Lambda not invoked (expected daily)
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-predictor-inference
      Statistic: Sum
      Period: 86400  # 1 day
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching  # weekends/holidays
      AlarmActions:
        - !Ref AlertsTopic

  # Research↔Predictor coverage gap. Emitted by the executor's signal_reader
  # on every run (value 0 on success, >0 when buy_candidates have no
  # prediction row). A positive value means the weekday Step Function's
  # coverage-gap self-heal (CheckPredictorCoverage → ReinvokePredictor) also
  # failed to close the gap before the executor read predictions.json —
  # indicates a regression of that orchestration. First observed as a silent
  # veto bypass on 2026-04-20 (4 of 5 entries bypassed the GBM veto).
  UnscoredBuyCandidatesGap:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-predictor-unscored-buy-candidates
      AlarmDescription: Executor saw buy_candidates without a prediction row — Step Function coverage-gap self-heal may have regressed
      Namespace: AlphaEngine/Predictor
      MetricName: unscored_buy_candidates_count
      Statistic: Maximum
      Period: 3600  # 1 hour
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching  # executor not running off-hours is expected
      AlarmActions:
        - !Ref AlertsTopic

  # Heartbeat alarms for EC2-based processes
  ExecutorMorningHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-executor-morning-no-heartbeat
      AlarmDescription: Executor morning planner did not emit heartbeat
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: executor-morning
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ExecutorDaemonHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-executor-daemon-no-heartbeat
      AlarmDescription: Executor daemon did not emit heartbeat
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: executor-daemon
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ExecutorEodHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-executor-eod-no-heartbeat
      AlarmDescription: EOD reconciliation did not emit heartbeat
      Namespace: AlphaEngine
