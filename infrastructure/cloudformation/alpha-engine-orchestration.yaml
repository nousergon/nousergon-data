  # --------------------------------------------------------------------------
  # SF execution log groups (CFN-owned) + L274 MutexConflict alarms (config#729)
  # --------------------------------------------------------------------------
  # These two LogGroups are the CloudWatch destinations for the two managed SFs'
  # LoggingConfiguration (above). They MUST be CFN resources (not relied upon as
  # side-effects of SF logging) so the metric filters below have a guaranteed,
  # ordered dependency to attach to. Names match the live ne-* state machines.
  # 30-day retention bounds cost (these are low-frequency pipelines: weekly +
  # daily, ERROR-level so only failed-execution events are logged).
  WeeklyFreshnessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/stepfunctions/ne-weekly-freshness-pipeline
      RetentionInDays: 30

  PreopenTradingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/stepfunctions/ne-preopen-trading-pipeline
      RetentionInDays: 30

  # alpha-engine-config-I2544/I2545: log groups for the two new child SFs,
  # same CFN-owned pattern (+ 30-day retention) as the two above — both new
  # SFs are CFN AWS::StepFunctions::StateMachine resources (unlike the
  # script-managed EOD pipeline), so their log groups are CFN resources too.
  WeeklyAdvisoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/stepfunctions/ne-weekly-advisory-pipeline
      RetentionInDays: 30

  ModelZooSundayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/stepfunctions/ne-modelzoo-sunday-pipeline
      RetentionInDays: 30

  # The SF MutualExclusionGuard (L274) fails a duplicate-trigger execution with a
  # terminal `MutexConflict` Fail — visible today only in SF execution history +
  # the SNS HandleFailure email. These metric-filters + alarms add a CloudWatch
  # signal on the RATE of MutexConflict Fails per SF; the first non-zero count
  # pages the operator to investigate the duplicate-trigger source (CFN drift, EB
  # internal retry, operator double-paste, cross-region replay).
  #
  # The filters key on the MutexConflict Cause text in the SF FailedEvent (logged
  # at level=ERROR + includeExecutionData=true via the LoggingConfiguration
  # above). DependsOn the log group so CFN creates the destination before the
  # filter.
  #
  # Per-SF attribution is via a DISTINCT MetricName per filter — NOT a Dimension.
  # AWS::Logs::MetricFilter only permits dimensions whose VALUE is a token
  # extracted from the filter pattern (e.g. `$.field`); a literal dimension value
  # is rejected at create with "filter pattern does not support dimensions". Our
  # pattern is a plain text match, so we give each SF its own metric name and
  # point its alarm at that name. (DefaultValue is also omitted — it is mutually
  # exclusive with dimensions and unnecessary here: the alarm's
  # TreatMissingData=notBreaching covers the zero-conflict steady state, where no
  # match -> no data point -> alarm OK.)
  #
  # EOD (ne-postclose-trading-pipeline) is now covered too — see the
  # PostcloseTradingMutexConflict* resources below (config#1416). It is still
  # script-managed (update_eod_pipeline_sf.sh + deploy-infrastructure.sh), so
  # unlike the two SFs above, its log group is deliberately NOT a CFN
  # resource — see the comment on that section for why.
  WeeklyFreshnessMutexConflictMetricFilter:
    Type: AWS::Logs::MetricFilter
    DependsOn: WeeklyFreshnessLogGroup
    Properties:
      LogGroupName: /aws/stepfunctions/ne-weekly-freshness-pipeline
      FilterPattern: '"MutexConflict"'
      MetricTransformations:
        - MetricNamespace: AlphaEngine/StepFunctions
          MetricName: WeeklyFreshnessMutexConflictFails
          MetricValue: '1'

  PreopenTradingMutexConflictMetricFilter:
    Type: AWS::Logs::MetricFilter
    DependsOn: PreopenTradingLogGroup
    Properties:
      LogGroupName: /aws/stepfunctions/ne-preopen-trading-pipeline
      FilterPattern: '"MutexConflict"'
      MetricTransformations:
        - MetricNamespace: AlphaEngine/StepFunctions
          MetricName: PreopenTradingMutexConflictFails
          MetricValue: '1'

  WeeklyFreshnessMutexConflictAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ne-weekly-freshness-mutex-conflict
      AlarmDescription: >-
        L274 MutexConflict Fail on the weekly-freshness (Saturday) pipeline
        (duplicate-trigger guard fired). First occurrence = investigate the
        duplicate-trigger source.
      Namespace: AlphaEngine/StepFunctions
      MetricName: WeeklyFreshnessMutexConflictFails
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  # config#1819 (2026-07-06/07): SNS-publish TaskFailed alarm on the weekly
  # SF. Motivating incident (2026-06-12): NotifyComplete (a SUCCESS-path
  # notifier) threw SNS.InvalidParameterException (Subject >100 chars / a
  # newline / empty), failing an otherwise-succeeded pipeline. The SF fix
  # (step_function.json) wraps NotifyComplete + NotifyShellRunComplete in
  # their own Catch so a publish failure no longer fails the execution —
  # but a silently-caught failure needs its own visibility surface so it
  # doesn't just vanish. Step Functions logs a TaskFailed history event at
  # LoggingConfiguration Level:ERROR REGARDLESS of whether a Catch handles
  # it (confirmed against the AWS docs event-level table), so this filter
  # sees the caught failure even though the execution itself still shows
  # SUCCEEDED. SCOPE / KNOWN LIMITATION: TaskFailed's logged fields
  # (resource/resourceType/error/cause) do NOT include the state name —
  # CloudWatch Logs Metric Filters match a single line and cannot
  # correlate across the separate TaskStateEntered event that DOES carry
  # the name, so this filter matches ANY sns:publish TaskFailed on this SF
  # (all 7 sns:publish states), not NotifyComplete specifically. That is
  # an acceptable trade for this alarm's purpose (today, on the weekly SF,
  # the only sns:publish sites with a Catch that swallows the failure
  # entirely — i.e. that could otherwise go silent — are NotifyComplete /
  # NotifyShellRunComplete; every other sns:publish site either has no
  # Catch (so a failure already fails the execution -> the existing
  # HandleFailure email path) or is itself a best-effort early-signal alert
  # inside ResearchPredictorParallel whose branch still ends up visible via
  # CheckBranchOutcomes). Same string-match-precision trade the existing
  # MutexConflict filters above already accept.
  SnsPublishFailedMetricFilter:
    Type: AWS::Logs::MetricFilter
    DependsOn: WeeklyFreshnessLogGroup
    Properties:
      LogGroupName: /aws/stepfunctions/ne-weekly-freshness-pipeline
      FilterPattern: '"TaskFailed" "sns:publish"'
      MetricTransformations:
        - MetricNamespace: AlphaEngine/StepFunctions
          MetricName: WeeklyFreshnessSnsPublishFails
          MetricValue: '1'

  SnsPublishFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ne-weekly-freshness-sns-publish-failed
      AlarmDescription: >-
        config#1819: an sns:publish Task failed on the weekly-freshness
        (Saturday) pipeline (caught or uncaught). If this fires with the
        execution otherwise SUCCEEDED, NotifyComplete/NotifyShellRunComplete
        caught a publish failure (best-effort, per config#1819) — check
        CloudWatch Logs for the TaskFailed cause (commonly
        SNS.InvalidParameterException) and the SNS delivery status; the
        pipeline result itself is NOT in question. If the execution FAILED,
        this fired alongside the existing HandleFailure email.
      Namespace: AlphaEngine/StepFunctions
      MetricName: WeeklyFreshnessSnsPublishFails
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  PreopenTradingMutexConflictAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ne-preopen-trading-mutex-conflict
      AlarmDescription: >-
        L274 MutexConflict Fail on the pre-open-trading (weekday) pipeline
        (duplicate-trigger guard fired). First occurrence = investigate the
        duplicate-trigger source.
      Namespace: AlphaEngine/StepFunctions
      MetricName: PreopenTradingMutexConflictFails
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  # --------------------------------------------------------------------------
  # EOD (ne-postclose-trading-pipeline) MutexConflict alarm (config#1416)
  # --------------------------------------------------------------------------
  # EOD is script-managed (infrastructure/update_eod_pipeline_sf.sh +
  # deploy-infrastructure.sh's update_or_create()), not a CFN
  # AWS::StepFunctions::StateMachine resource, so — unlike the weekly/preopen
  # pair above — its log group is NOT a CFN resource: the scripts create it
  # idempotently (create-log-group + put-retention-policy) before setting
  # LoggingConfiguration on the state machine. CFN owns only the filter +
  # alarm below, which read the log group by its literal name. This ordering
  # is deliberate: the scripts' state-machine update (deploy-infrastructure.sh
  # step 3) runs BEFORE this stack's deploy (step 4), so a CFN-owned log group
  # would not exist yet on first deploy.
  PostcloseTradingMutexConflictMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: /aws/stepfunctions/ne-postclose-trading-pipeline
      FilterPattern: '"MutexConflict"'
      MetricTransformations:
        - MetricNamespace: AlphaEngine/StepFunctions
          MetricName: PostcloseTradingMutexConflictFails
          MetricValue: '1'

  PostcloseTradingMutexConflictAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ne-postclose-trading-mutex-conflict
      AlarmDescription: >-
        L274 MutexConflict Fail on the post-close (EOD) pipeline
        (duplicate-trigger guard fired). First occurrence = investigate the
        duplicate-trigger source.
      Namespace: AlphaEngine/StepFunctions
      MetricName: PostcloseTradingMutexConflictFails
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

