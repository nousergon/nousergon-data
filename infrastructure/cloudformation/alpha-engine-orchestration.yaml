AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Alpha Engine orchestration infrastructure — Step Functions, EventBridge rules,
  SNS topics, and CloudWatch alarms. Does NOT manage Lambda functions, EC2
  instances, or IAM roles (those are managed separately via deploy scripts
  and console). This template captures the "glue" that connects modules.

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  MicroInstanceId:
    Type: String
    Default: i-09b539c844515d549
    Description: Always-on EC2 micro instance ID (runs data collection, dashboard)

  TradingInstanceId:
    Type: String
    Default: i-018eb3307a21329bf
    Description: Trading EC2 instance ID (runs executor, started/stopped daily)

  ResearchLambdaArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:711398986525:function:alpha-engine-research-runner:live

  DataCollectorLambdaArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:711398986525:function:alpha-engine-data-collector:live

  PredictorLambdaArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:711398986525:function:alpha-engine-predictor-inference:live

  AlertsLambdaArn:
    Type: String
    Default: arn:aws:lambda:us-east-1:711398986525:function:alpha-engine-research-alerts

  StepFunctionsRoleArn:
    Type: String
    Default: arn:aws:iam::711398986525:role/alpha-engine-step-functions-role

  EventBridgeSfnRoleArn:
    Type: String
    Default: arn:aws:iam::711398986525:role/alpha-engine-eventbridge-sfn-role

  EventBridgeEc2RoleArn:
    Type: String
    Default: arn:aws:iam::711398986525:role/alpha-engine-eventbridge-role

  AlertEmail:
    Type: String
    Default: cipher813@gmail.com
    Description: Email for SNS alert notifications

# ============================================================================
# Resources
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # SNS Topics
  # --------------------------------------------------------------------------
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: alpha-engine-alerts
      DisplayName: Alpha Engine Alerts

  AlertsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # --------------------------------------------------------------------------
  # DynamoDB — Step Function Execution Mutex (L274 SF MutualExclusionGuard)
  # --------------------------------------------------------------------------
  # Single-writer-per-cadence-cell invariant for the three Alpha Engine SFs.
  # Closes the architectural hole that the L286a/b producer-side
  # `universe_writer_lock` covers for manual `daily_append` invocations —
  # that lock guards the data writer; this table guards the SF entry point.
  # Together they cover both halves of "exactly one cron-fired execution of
  # each SF per minute bucket."
  #
  # Trigger of record: the 2026-05-26 duplicate-EventBridge-target incident
  # (PR #322), where two parallel SF executions raced 321 unique-symbol
  # ArcticDB E_NON_INCREASING_INDEX_VERSION errors in MorningEnrich and
  # hard-failed the weekday pipeline. The PR #322 CFN-target-uniqueness
  # CI gate catches the SPECIFIC duplicate-target shape; this mutex catches
  # the broader class (operator double-paste, EventBridge internal retry-on-
  # throttle, cross-region replay coincidence, any future shape the CI
  # chokepoint misses).
  #
  # Schema: mutex_key (S) PK only — no TTL attribute and no auto-release.
  # The mutex_key encodes `{state-machine-name}#{pipeline_role}#{minute-bucket}`,
  # so a successfully-acquired key is naturally single-use: no future
  # execution can land in the same minute-bucket of a past UTC date. Item
  # accumulation is ~12 items/week × cadence runs ≈ <1000/yr; PAY_PER_REQUEST
  # storage cost is negligible (sub-cent annual). Periodic sweeper deferred —
  # operationally meaningful staleness is a non-issue.
  ExecutionMutexTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: alpha-engine-sf-execution-mutex
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: mutex_key
          AttributeType: S
      KeySchema:
        - AttributeName: mutex_key
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false

  # NOTE: AlertsTopic also has a SECOND subscriber — a Lambda that mirrors
  # every alert to s3://alpha-engine-research/changelog/incidents/ for the
  # system-wide event-mining changelog. That Lambda + its IAM role + its
  # SNS subscription are managed OUTSIDE this CF stack, in
  # `infrastructure/lambdas/changelog-incident-mirror/`. Reason: when those
  # resources lived in this stack, every CI deploy hit a perm-cascade on
  # the github-actions-lambda-deploy OIDC role (iam:TagRole, iam:GetRole,
  # ...). Orphaning the Lambda kept the OIDC role narrow and removed the
  # cascade. See ROADMAP "SNS-mirror Lambda — orphan vs CF management"
  # for the full trade-off + future reconsideration triggers.

  # --------------------------------------------------------------------------
  # Step Functions — Saturday Pipeline
  # --------------------------------------------------------------------------
  SaturdayPipeline:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: alpha-engine-saturday-pipeline
      RoleArn: !Ref StepFunctionsRoleArn
      DefinitionS3Location:
        Bucket: alpha-engine-research
        Key: infrastructure/step_function.json
      # Alternative: inline definition via DefinitionString
      # Using S3 location so the JSON files in the repo are the source of truth.
      # Deploy script uploads JSON to S3 then updates the state machine.

  # --------------------------------------------------------------------------
  # Step Functions — Weekday Pipeline
  # --------------------------------------------------------------------------
  WeekdayPipeline:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: alpha-engine-weekday-pipeline
      RoleArn: !Ref StepFunctionsRoleArn
      DefinitionS3Location:
        Bucket: alpha-engine-research
        Key: infrastructure/step_function_daily.json

  # --------------------------------------------------------------------------
  # Step Functions — Backtest+Eval Pipeline (config#830)
  # --------------------------------------------------------------------------
  # Standalone mid-week rerun SF: Backtester → Evaluator → NotifyComplete only,
  # reusing the exact state definitions from the Saturday SF. AWS Step Functions
  # only supports `redrive` from FAILED executions, so when only backtester or
  # evaluator CODE changes, re-running the full Saturday SF (DataPhase1 + RAG +
  # Research + DataPhase2 + PredictorTraining) was ~80 min of waste. This SF runs
  # just the two changed stages off the existing weekly data/research/training
  # artifacts. Replaces the local-blocking
  # crucible-backtester/infrastructure/spot_backtest_and_evaluate.sh shell chain
  # for orchestrated reruns (the script stays for local dev). No EventBridge
  # trigger — invoked manually from the console/CLI for mid-week partial reruns.
  # Same DefinitionS3Location pattern as the other SFs: deploy-infrastructure.sh
  # uploads the JSON to S3 and is the source of truth.
  BacktestEvalPipeline:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: alpha-engine-backtest-eval-pipeline
      RoleArn: !Ref StepFunctionsRoleArn
      DefinitionS3Location:
        Bucket: alpha-engine-research
        Key: infrastructure/step_function_backtest_eval.json

  # --------------------------------------------------------------------------
  # EventBridge Rules — Pipeline Triggers
  # --------------------------------------------------------------------------
  SaturdayTrigger:
    Type: AWS::Events::Rule
    Properties:
      Name: alpha-engine-saturday
      # Schedule chosen so polygon's Friday daily aggregate has settled
      # (T+1 lag) before MorningEnrich + DataPhase1 fetch it.
      # 09:00 UTC = 02:00 AM PT Sat (PDT) / 01:00 AM PT Sat (PST).
      Description: Saturday 09:00 UTC (02:00 AM PT) — triggers full Alpha Engine pipeline after polygon T+1 settle
      ScheduleExpression: 'cron(0 9 ? * SAT *)'
      State: ENABLED
      Targets:
        # SINGLE TARGET PER RULE. EventBridge dispatches the cron event
        # to every target on a rule; a duplicate target ID fans the
        # trigger to two parallel SF executions. The Tuesday 5/26
        # weekday-pipeline failure (321 E_NON_INCREASING_INDEX_VERSION
        # ArcticDB races during MorningEnrich) was caused by exactly
        # that — PR #317 added a parallel target via the deploy script
        # alongside this CFN target. The substrate gate is the
        # TestCFNTargetUniqueness chokepoint, which fails CI if any
        # cron rule grows a second target. SoT for this rule is THIS
        # FILE; the deploy scripts no longer touch EventBridge.
        - Id: saturday-pipeline
          Arn: !Ref SaturdayPipeline
          RoleArn: !Ref EventBridgeSfnRoleArn
          # pipeline_role tag (Option-D 2026-05-25): identifies this as the
          # canonical Saturday weekly cadence run. Page 25 filters to
          # role="weekly" by default so smoke / recovery / operator-replay
          # executions don't displace the real weekly run as "most recent".
          # Ad-hoc operator launches MUST set their own pipeline_role
          # (smoke / recovery / backfill / operator-replay) per the
          # taxonomy in pipeline-reporting-revamp-260524.md §6.
          Input: !Sub |
            {
              "ec2_instance_id": ["${MicroInstanceId}"],
              "sns_topic_arn": "${AlertsTopic}",
              "pipeline_role": "weekly"
            }

  # Friday-PM "shell run" cron rule (alpha-engine-friday-shell-run) RETIRED
  # 2026-05-29 (ROADMAP L4055): superseded by the event-driven
  # alpha-engine-eod-success-friday-shell-trigger Lambda
  # (infrastructure/lambdas/eod-success-friday-shell-trigger/, shipped #282),
  # which fires the Saturday SF in shell_run mode on the Friday EOD-SF
  # SUCCEEDED transition (trading_day-bound, not wall-clock) — eliminating the
  # cron's three failure modes (no-fire on Friday EOD failure, late-rerun
  # blindness, StopTradingInstance race). The cron ran DISABLED from the 5/21
  # event-driven cutover; the event-driven path confirmed across two Fridays
  # (5/22 + 5/29) before this deletion. The shell_run SF gate
  # (InitializeInput→CheckShellRun/ApplyShellRunDefaults) is UNCHANGED — the
  # Lambda still supplies {"shell_run": true, "pipeline_role": "shell-run"}.

  WeekdayTrigger:
    Type: AWS::Events::Rule
    Properties:
      Name: alpha-engine-weekday
      # 2026-05-19: moved 06:00 → 05:45 PT (13:00 → 12:45 UTC). At the old
      # 06:00 start the daemon was ready ~31–32 min later (06:31–06:32 PT)
      # even on SUCCESSFUL runs — i.e. the order book/daemon was ~1–2 min
      # LATE for the 06:30 PT open every single day. Combined with the
      # alpha-engine-data#264 MorningEnrich speedup (~−12 min, no longer
      # flirting with the 30-min SSM timeout), a 05:45 start gives ~22 min
      # expected / ~32 min P99 to daemon-ready → ready ≤ 06:17 PT at the
      # 99th percentile, comfortably before the 06:30 open with margin.
      # NOTE (pre-existing, unchanged here): the UTC expression assumes
      # PDT (UTC−7); during PST the effective PT start shifts an hour.
      # That DST caveat predates this change and is intentionally left
      # as-is — out of scope for the start-time fix.
      Description: Weekday 12:45 UTC (5:45 AM PT, PDT) — daily data + predictor + executor; daemon ready before 06:30 PT open
      ScheduleExpression: 'cron(45 12 ? * MON-FRI *)'
      State: ENABLED
      Targets:
        # SINGLE TARGET PER RULE. See the SaturdayTrigger Targets
        # comment for the 2026-05-26 duplicate-target incident that
        # codified this invariant. SoT for this rule is THIS FILE;
        # the deploy scripts no longer touch EventBridge.
        - Id: weekday-pipeline
          Arn: !Ref WeekdayPipeline
          RoleArn: !Ref EventBridgeSfnRoleArn
          # pipeline_role="daily" (Option-D 2026-05-25): identifies this as
          # the canonical weekday trading-cadence run. Page 25 filters to
          # role="daily" by default for the Weekday section.
          Input: !Sub |
            {
              "ec2_instance_id": ["${MicroInstanceId}"],
              "trading_instance_id": ["${TradingInstanceId}"],
              "sns_topic_arn": "${AlertsTopic}",
              "pipeline_role": "daily"
            }

  # --------------------------------------------------------------------------
  # EventBridge Rules — Independent Triggers
  # --------------------------------------------------------------------------
  ResearchAlerts:
    Type: AWS::Events::Rule
    Properties:
      Name: alpha-research-alerts
      Description: Intraday price alerts every 30 min during market hours
      ScheduleExpression: 'cron(0/30 13-21 ? * MON-FRI *)'
      State: ENABLED
      Targets:
        - Id: alerts-lambda
          Arn: !Ref AlertsLambdaArn

  ResearchAlertsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AlertsLambdaArn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ResearchAlerts.Arn

  # --------------------------------------------------------------------------
  # EventBridge Scheduler — Stop Trading Instance (10 PM PT backstop)
  # --------------------------------------------------------------------------
  # Note: EventBridge Scheduler uses a different API than EventBridge Rules.
  # CloudFormation support for Scheduler is via AWS::Scheduler::Schedule.
  #
  # Role: late-night cost-guard backstop. The EOD SF's
  # ``StopTradingInstance`` + ``ForceStopInstance`` states are the
  # authoritative stoppers right after market close (success or failure
  # path). This scheduler only fires if both of those paths missed —
  # e.g. EOD SF never started, daemon never triggered the SF, or AWS
  # SDK call failures left the instance running past expected stop.
  # 10:00 PM PT places it ~8 h after market close, well outside any
  # legitimate same-day workflow.
  StopTradingSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: alpha-engine-stop-trading
      Description: Cost-guard backstop — stop trading EC2 at 10 PM PT if EOD SF didn't
      ScheduleExpression: 'cron(0 22 ? * MON-FRI *)'
      ScheduleExpressionTimezone: 'America/Los_Angeles'
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: 'arn:aws:scheduler:::aws-sdk:ec2:stopInstances'
        RoleArn: !Ref EventBridgeEc2RoleArn
        Input: !Sub '{"InstanceIds": ["${TradingInstanceId}"]}'

  # --------------------------------------------------------------------------
  # CloudWatch Alarms
  # --------------------------------------------------------------------------
  HealthCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: AlphaEngine-HealthCheckFailures
      AlarmDescription: Alert when any data health check fails
      Namespace: AlphaEngine
      MetricName: HealthChecksFailed
      Statistic: Maximum
      Period: 21600  # 6 hours
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ResearchRunnerErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-research-runner-errors
      AlarmDescription: Research Lambda errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-research-runner
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ResearchRunnerNoInvocations:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-research-runner-no-invocations
      AlarmDescription: Research Lambda not invoked (expected weekly)
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-research-runner
      Statistic: Sum
      Period: 604800  # 7 days
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertsTopic

  PredictorInferenceErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-predictor-inference-errors
      AlarmDescription: Predictor Lambda errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-predictor-inference
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  PredictorNoInvocations:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-predictor-inference-no-invocations
      AlarmDescription: Predictor Lambda not invoked (expected daily)
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-predictor-inference
      Statistic: Sum
      Period: 86400  # 1 day
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching  # weekends/holidays
      AlarmActions:
        - !Ref AlertsTopic

  # Research↔Predictor coverage gap. Emitted by the executor's signal_reader
  # on every run (value 0 on success, >0 when buy_candidates have no
  # prediction row). A positive value means the weekday Step Function's
  # coverage-gap self-heal (CheckPredictorCoverage → ReinvokePredictor) also
  # failed to close the gap before the executor read predictions.json —
  # indicates a regression of that orchestration. First observed as a silent
  # veto bypass on 2026-04-20 (4 of 5 entries bypassed the GBM veto).
  UnscoredBuyCandidatesGap:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-predictor-unscored-buy-candidates
      AlarmDescription: Executor saw buy_candidates without a prediction row — Step Function coverage-gap self-heal may have regressed
      Namespace: AlphaEngine/Predictor
      MetricName: unscored_buy_candidates_count
      Statistic: Maximum
      Period: 3600  # 1 hour
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching  # executor not running off-hours is expected
      AlarmActions:
        - !Ref AlertsTopic

  # Heartbeat alarms for EC2-based processes
  ExecutorMorningHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-executor-morning-no-heartbeat
      AlarmDescription: Executor morning planner did not emit heartbeat
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: executor-morning
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ExecutorDaemonHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-executor-daemon-no-heartbeat
      AlarmDescription: Executor daemon did not emit heartbeat
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: executor-daemon
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  ExecutorEodHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-executor-eod-no-heartbeat
      AlarmDescription: EOD reconciliation did not emit heartbeat
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: executor-eod
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

  PredictorTrainingHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-predictor-training-no-heartbeat
      AlarmDescription: Predictor training did not emit heartbeat (expected weekly)
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: predictor-training
      Statistic: Sum
      Period: 604800
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertsTopic

  BacktesterHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-backtester-no-heartbeat
      AlarmDescription: Backtester did not emit heartbeat (expected weekly)
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: backtester
      Statistic: Sum
      Period: 604800
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertsTopic

  EvaluatorHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-evaluator-no-heartbeat
      AlarmDescription: Evaluator did not emit heartbeat (expected weekly — split from Backtester 2026-05-07)
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: evaluator
      Statistic: Sum
      Period: 604800
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertsTopic

  RAGIngestionHeartbeat:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-rag-ingestion-no-heartbeat
      AlarmDescription: RAG ingestion did not emit heartbeat (expected weekly)
      Namespace: AlphaEngine
      MetricName: Heartbeat
      Dimensions:
        - Name: Process
          Value: rag-ingestion
      Statistic: Sum
      Period: 604800
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertsTopic

  ResearchAlertsErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: alpha-engine-research-alerts-errors
      AlarmDescription: Research alerts Lambda errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: alpha-engine-research-alerts
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertsTopic

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  AlertsTopicArn:
    Value: !Ref AlertsTopic
    Description: SNS topic for all Alpha Engine alerts

  SaturdayPipelineArn:
    Value: !Ref SaturdayPipeline
    Description: Saturday pipeline state machine ARN

  WeekdayPipelineArn:
    Value: !Ref WeekdayPipeline
    Description: Weekday pipeline state machine ARN

  BacktestEvalPipelineArn:
    Value: !Ref BacktestEvalPipeline
    Description: Backtest+Eval mid-week rerun pipeline state machine ARN (config#830)

  ExecutionMutexTableName:
    Value: !Ref ExecutionMutexTable
    Description: DynamoDB table name for SF execution mutex (L274)
