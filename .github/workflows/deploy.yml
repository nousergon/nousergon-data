name: Deploy

on:
  push:
    branches: [main]
    paths:
      # Only rebuild + redeploy the Phase 2 Lambda when code that actually
      # lands in the Docker image changes. DataPhase1 runs as EC2 SSM
      # (not Lambda) so changes to phase1-only code would still require a
      # separate deploy mechanism — see weekly_collector.py path guard.
      - 'collectors/**'
      - 'store/**'
      - 'weekly_collector.py'
      - 'polygon_client.py'
      - 'ssm_secrets.py'
      - 'lambda/**'
      - 'config.py'
      - 'flow-doctor.yaml'
      - 'requirements*.txt'
      - 'Dockerfile*'
      - 'infrastructure/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build + deploy Phase 2 Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout data repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: alpha-engine-data

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      # The deploy.sh canary-rollback path publishes a dedup-keyed alert via
      # `python3 -m krepis.alerts publish` so a rolled-back deploy isn't
      # silent on the alert channel beyond the GHA red-icon. Without krepis
      # installed in the runner Python, the alerts call fails with
      # ModuleNotFoundError and the alert never publishes — the recurring
      # failure mode L221 retrofit was designed to fix.
      #
      # FIXED 2026-07-01 (config#1545): this step previously installed the
      # stale `alpha-engine-lib @ ...@v0.26.0` ref, which provides the
      # `alpha_engine_lib` import name — but deploy.sh calls `krepis.alerts`
      # (migrated from `nousergon_lib.alerts` at config#1339). Neither name
      # matched what was actually installed, so this alert path had been
      # silently dead (ModuleNotFoundError swallowed by `|| true`) since the
      # nousergon_lib migration landed — the exact L221 failure mode this
      # step exists to prevent. Pin matches requirements.txt's `krepis>=0.6.0`
      # floor. No extras needed (alerts uses boto3/SNS, preinstalled on
      # ubuntu-latest).
      - name: Set up Python for canary-rollback alert publish
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install krepis for deploy.sh alerts call
        run: pip install "krepis>=0.6.0"

      - name: Deploy Phase 2 Lambda (alpha-engine-data-collector)
        working-directory: alpha-engine-data
        run: bash infrastructure/deploy.sh

      - name: Report deployed version
        working-directory: alpha-engine-data
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          aws lambda get-function \
            --function-name alpha-engine-data-collector \
            --query "Configuration.[LastModified,CodeSha256]" \
            --output text

      - name: Append to system-wide deploy changelog
        if: always()
        uses: nousergon/nousergon-docs/.github/actions/append-changelog@8a904b7a817901f2520dd87131ff307ed97fee02 # main
        with:
          deploy_status: ${{ job.status == 'success' && 'success' || 'failure' }}
          deploy_workflow: deploy.yml

  # Alert (Telegram) on genuine post-merge failure of this workflow on the
  # default branch. Reusable workflow + transport in nousergon-lib. config#1128.
  notify-main-failure:
    needs: [deploy]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@a3b11aee34f243da6cfc77d98fdfc9899d1d3f84 # main
    secrets: inherit
