name: Deploy saturday-sf-watch-dispatcher

# Auto-deploy the alpha-engine-saturday-sf-watch-dispatcher Lambda CODE on merge
# to main. This is the PRIMARY watch-plane Lambda that monitors the weekly SF
# health. Merged code fixes (e.g., config#2267 site-4 fail-loud, docstring
# improvements) were sitting un-deployed until an operator ran deploy.sh by hand.
# This closes that gap for the CODE path only.
#
# Separation of concerns: this deploys CODE only (deploy.sh with NO flag —
# this script's default/flagless run IS already code-only; --bootstrap is
# what ADDS the IAM-role-creation + Lambda-function-creation on top, not the
# reverse). Same shape as sf-watch-spot-dispatcher's: the github-actions-lambda-
# deploy OIDC role deliberately has no iam:CreateRole / iam:PutRolePolicy
# (fleet-wide policy after 4 IAM-clobber incidents in 2 months; see
# infrastructure/iam/README.md) — an IAM/profile change still requires an
# operator to run `deploy.sh --bootstrap` by hand.
#
# IAM: no new grant needed — LambdaUpdate already covers
# arn:...:function:alpha-engine-* (infrastructure/iam/github-actions-lambda-
# deploy.json), which already includes this function.
#
# Anchors: deploy-sf-watch-spot-dispatcher.yml (template) · config#2295

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/lambdas/saturday-sf-watch-dispatcher/**'
      - '.github/workflows/deploy-saturday-sf-watch-dispatcher.yml'
  workflow_dispatch:

concurrency:
  group: deploy-saturday-sf-watch-dispatcher-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy saturday-sf-watch-dispatcher Lambda (code-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v7
        with:
          path: alpha-engine-data

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Set up Python 3.12 (match Lambda runtime)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Deploy saturday-sf-watch-dispatcher (code-only — no --bootstrap)
        working-directory: alpha-engine-data
        run: bash infrastructure/lambdas/saturday-sf-watch-dispatcher/deploy.sh

      - name: Report deployed version
        working-directory: alpha-engine-data
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          aws lambda get-function \
            --function-name alpha-engine-saturday-sf-watch-dispatcher \
            --query "Configuration.[LastModified,CodeSha256]" \
            --output text

      - name: Append to system-wide deploy changelog
        if: always()
        uses: nousergon/nousergon-docs/.github/actions/append-changelog@main
        with:
          deploy_status: ${{ job.status == 'success' && 'success' || 'failure' }}
          deploy_workflow: deploy-saturday-sf-watch-dispatcher.yml

  notify-main-failure:
    needs: [deploy]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
