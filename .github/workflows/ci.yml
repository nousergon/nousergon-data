name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

      # Changelog mirror Lambdas live outside tests/ (pytest testpaths) and each
      # stubs boto3 in sys.modules, so they can't share a pytest process. Run
      # each in its own interpreter. Guards the deterministic SNS classifier
      # (classify.py) against a mislabeling regression.
      - name: Run changelog lambda tests
        run: |
          python3 infrastructure/lambdas/_shared/test_vocab.py
          python3 infrastructure/lambdas/_shared/test_classify.py
          python3 infrastructure/lambdas/changelog-incident-mirror/test_handler.py
          python3 infrastructure/lambdas/changelog-cloudwatch-mirror/test_handler.py

      # config#1759: the two suites above were the ONLY lambda handler tests
      # that ran pre-merge — every other infrastructure/lambdas/*/test_handler.py
      # (groom-liveness-probe, freshness-monitor, scheduled-groom-dispatcher,
      # etc.) executed for the first time inside each deploy-*.yml's deploy.sh
      # pytest gate, which fires on push to main — POST-merge. A green PR check
      # could still ship a broken handler and red main first (exactly what
      # happened to nousergon-data#630 / freshness-monitor, healed by #631).
      #
      # Fix: discover every handler suite by GLOB (not hand-list), so a new
      # lambda is covered automatically. Each suite runs in its own interpreter
      # with ONLY that lambda's own requirements.txt installed (the same file
      # deploy.sh's preflight pytest gate already uses as its deps source of
      # truth — see e.g. freshness-monitor/deploy.sh step 1b), into an isolated
      # --target dir so one lambda's deps can't leak into / collide with
      # another's stubbed-boto3-in-sys.modules test process. The changelog pair
      # above is intentionally excluded here (zero deps, already covered).
      - name: Run ALL lambda handler tests (glob-derived, per-lambda deps)
        # config#2381: this pre-merge glob and every post-merge deploy.sh gate
        # now delegate to the SAME _shared/run_handler_tests.sh, so the two can
        # never re-drift into the naive no-install form (config#2295). ci passes
        # `-r requirements.txt` (the config#1759 superset-source-of-truth model);
        # deploy scripts pass a minimal explicit dep set — both share the helper's
        # provision-then-run mechanism.
        env:
          # ssm-liveness-poller/index.py (and any future handler) calls
          # boto3.client(...) at MODULE SCOPE with no explicit region. Lambdas
          # with a deploy-*.yml get a region for free from that workflow's
          # configure-aws-credentials step (aws-region: us-east-1); lambdas
          # with none (like ssm-liveness-poller — never gated anywhere before
          # this PR) hit botocore's NoRegionError on a bare `ubuntu-latest`
          # runner with zero AWS env. No real AWS calls are made (clients are
          # mocked/monkeypatched in-test) — this only satisfies SDK client
          # construction. Matches the region used fleet-wide (REGION default
          # in every lambda's deploy.sh).
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -uo pipefail
          shopt -s nullglob
          source infrastructure/lambdas/_shared/run_handler_tests.sh
          fail=0
          for t in infrastructure/lambdas/*/test_handler.py; do
            d="$(dirname "$t")"
            case "$d" in
              */changelog-incident-mirror|*/changelog-cloudwatch-mirror)
                continue ;;
            esac
            echo "::group::$t"
            if [ -f "$d/requirements.txt" ]; then
              run_handler_tests "$d" -r "$d/requirements.txt" || fail=1
            else
              run_handler_tests "$d" || fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Security audit
        run: |
          pip install pip-audit
          IGNORE_ARGS=()
          if [ -f .github/pip-audit-ignore.txt ]; then
            while IFS= read -r vuln_id; do
              IGNORE_ARGS+=(--ignore-vuln "$vuln_id")
            done < <(grep -vE '^\s*#|^\s*$' .github/pip-audit-ignore.txt)
          fi
          pip-audit "${IGNORE_ARGS[@]}"

  # Alert (Telegram) ONLY on genuine post-merge breakage of the default
  # branch. PR-branch reds (mid-fix commits, cross-repo lib-tag merge-order
  # races) stay silent. Reusable workflow + transport in nousergon-lib.
  # See alpha-engine-config#1128.
  notify-main-failure:
    needs: [test]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
